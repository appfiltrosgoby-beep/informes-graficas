<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Logo Goby</title>
  <desc id="desc">Marca Goby en azul rey, blanco y detalles dorados</desc>
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1E62D0"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#E5C36A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="4" y="10" width="412" height="100" rx="10" fill="#0A0A0A" stroke="url(#goldGrad)" stroke-width="2"/>
  <polygon points="28,92 78,26 250,26 198,92" fill="url(#blueGrad)"/>
  <text x="52" y="78" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800" font-style="italic" fill="#FFFFFF" filter="url(#shadow)">GOBY</text>
  <rect x="28" y="94" width="224" height="8" fill="url(#goldGrad)"/>
  <text x="270" y="56" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="1" fill="#EDEDED">FILTRACION INDUSTRIAL</text>
  <text x="270" y="76" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="1" fill="#EDEDED">MECANICA E HIDRAULICA</text>
</svg>
